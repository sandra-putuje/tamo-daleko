:root {
  --belgian-gold: #f7dc94;          /* Nežna, svetlo-zlatna boja pečenog testa */
  --royal-burgundy: #d98880;        /* Pastelna, ublažena roze-crvena */
  --chocolate-brown: #7e685a;       /* Blaga, prašnjava braon (mlečni kakao) */
  --lace-white: #fdfbf7;            /* Topla krem-bela, boja domaćeg šlaga */
  --misty-blue: #e8ece9;            /* Veoma nežna sivo-maslinasta, boja kaldrme u senci */

body {

  color: var(--text-color);

    linear-gradient(155deg,

  background-size: cover;
  text-align: center;
}

/* da sadržaj bude iznad */
body > * {
  position: relative;
  z-index: 1;
}
header {
  color: var(--header-color);

    .naslov-lokacije{

      display: block;

      color: var(--card-title-color);
      font-size: 1.3rem;
      text-align: center;
      padding: 0 1rem 0.5rem 1rem;
    }

.naslov-lokacije::after{
  content:"";
  position:absolute;
  left: 25%;        /* Centrirano */
  bottom:0;
  width:50%;        
  height:2px;
  background-color: var(--card-title-color);
  border-radius:2px;
}

/* KARTICE */
.card-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto 40px auto;
  padding: 0 10px;
}

.card {
  width: 260px;
  height: 300px;
  background: transparent; 
  border-radius: 15px;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.1);
  overflow: hidden;
  text-decoration: none;
  color: var(--text-color);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card:hover,
.card.aktivna {
  transform: scale(1.05);
  box-shadow: 3px 4px 10px rgba(0,0,0,0.25);
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(247,245,240,0.95));
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-bottom: 2px solid rgba(74, 44, 17, 0.2); /* Čokoladni podton */
  flex-shrink: 0;
}

.card-title {
  font-size: 1.1em;
  padding: 8px 15px;
  flex-grow: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: transparent;
  transition: background 0.25s ease, color 0.25s ease;
}

    .button-grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:15px;
      margin-top:20px;
    }

.back-btn {
  display: inline-block;
  margin-top: 40px;
  padding: 10px 20px;
  background: linear-gradient(
    to bottom right,
    #8a2b3d,  /* Bordo tonovi */
    #6b1d2f   
  );
  color: #fff;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: none;            
  border: none;                
  transition: background 0.3s, transform 0.2s;
  cursor: pointer;
}

.back-btn:hover {
  background: linear-gradient(
    to bottom right,
    #a13d52,
    #8a2b3d
  );
  transform: scale(1.05);
}

.emoji-icon {
  width: 2.5em;
  height: 2.5em;
  vertical-align: -0.7em;
  margin-right: 0.4em;
  object-fit: contain;
}

@media (max-width:600px) {
  .card-grid {
    flex-direction: column;
    align-items: center; 
  }
  
  .card {
    width: 90%;      
    max-width: 320px; 
    height: auto;
  }

  .naslov-lokacije {
    width: 90%;      
    max-width: 100%; 
    font-size: 1.4rem; 
    padding: 10px 5px;
    margin: 1rem auto;
  }
  
  .naslov-lokacije::after {
    left: 10%; 
    width: 80%; 
  }
}

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const aktivna = urlParams.get('aktivna');
    if (aktivna) {
      const link = document.querySelector(`a[href="${aktivna}.html"]`);
      if (link) {
        link.classList.add("aktivna");
        window.addEventListener('load', () => {
          link.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      }
    }
  </script>

  <script>
  const lista = [...document.querySelectorAll('.card-grid a.card')]
    .map(kartica => {
      return {
        fajl: kartica.getAttribute('href'),
        ime: kartica.textContent.trim()
      };
    })
    .filter(el => el.fajl && el.ime);

  localStorage.setItem('belgijaList', JSON.stringify(lista));

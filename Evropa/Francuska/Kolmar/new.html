<style>
:root {
  /* Alzaške bajkovite nijanse */
  --colmar-pink: #fbc6c6;       /* Karakteristična pastelna fasada */
  --alsace-wine: #e2a2b3;       /* Nežna, vinska roze-trula ruža */
  --canal-blue: #b2d7db;        /* Voda u Maloj Veneciji pod suncem */
  --geranium-red: #f38181;      /* Rascvetane muškatle na prozorima */
  --timber-brown: #6b4d3a;      /* Boja drvenih greda za tekst/detalje */
  
  --text-color: #2b2521;        /* Topla, mekana tamna za vrhunsku čitljivost */
  --header-color: #8c3a4f;      /* Duboka boja alzaškog crnog hronata / crnog vina */
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Georgia", "Trebuchet MS", Arial, sans-serif;
  color: var(--text-color);
  /* Preliv koji simulira refleksiju šarenih fasada u kanalima Male Venecije */
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6), transparent 50%),
    linear-gradient(150deg, var(--canal-blue) 0%, #f7eae1 30%, var(--colmar-pink) 65%, var(--alsace-wine) 100%);
  background-attachment: fixed;
  background-size: cover;
  text-align: center;
}

header {
  color: var(--header-color);
  font-size: 2.2rem;
  font-weight: 700;
  padding: 28px 16px;
  text-align: center;
  text-shadow: 1px 1px 3px rgba(255,255,255,0.7);
}

.naslov-lokacije {
  display: block;
  max-width: 1000px;
  margin: 1.5rem auto;
  font-size: 1.3rem;
  color: var(--header-color);
  border-bottom: 2px solid var(--header-color);
  padding-bottom: 6px;
  position: relative;
}

/* KARTICE */
.card-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto 40px auto;
  padding: 0 10px;
}

.card {
  width: 260px;
  height: 300px;
  /* Poluprozirna svetla bela sa blagim tonom slonovače za francuski šik */
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,248,248,0.92));
  border-radius: 15px;
  box-shadow: 2px 3px 10px rgba(140, 58, 79, 0.08); /* Blaga vinska senka */
  overflow: hidden;
  text-decoration: none;
  color: var(--text-color);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card:hover,
.card.aktivna {
  transform: scale(1.05);
  box-shadow: 3px 5px 15px rgba(140, 58, 79, 0.18);
  /* Hover nežno povlači toplu pastelnu roze nijansu sa fasada */
  background: linear-gradient(135deg, #fff2f2 0%, #fffbfb 100%);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-bottom: 2px solid rgba(13a, 58, 79, 0.15);
  flex-shrink: 0;
}

.card-title {
  font-size: 1.1em;
  padding: 8px 15px;
  flex-grow: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.button-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.button {
  /* Dugmad u tonu vode kanala, daje odličan kontrast roze pozadini */
  background: rgba(178, 215, 219, 0.55);
  color: var(--text-color);
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 1px 2px 4px rgba(0,0,0,0.06);
}

.button:hover {
  background: rgba(178, 215, 219, 0.8);
  box-shadow: 1px 3px 6px rgba(0,0,0,0.1);
}

.back-btn {
  display: inline-block;
  margin-top: 40px;
  padding: 10px 20px;
  /* Glavno dugme u elegantnom vinsko-roze prelivu */
  background: linear-gradient(to bottom right, rgba(243,129,129,0.8), rgba(226,162,179,0.95));
  color: white;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.08);
  transition: background 0.3s, transform 0.2s;
  cursor: pointer;
}

.back-btn:hover {
  background: linear-gradient(to bottom right, rgba(243,129,129,0.95), rgba(226,162,179,1));
  transform: scale(1.05);
}

@media (max-width:600px) {
  .card-grid {
     flex-direction: column;
  }
  .card {
    width: 100%;
    height: 320px;
  }
  .card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-bottom: 2px solid rgba(13a, 58, 79, 0.15);
    flex-shrink: 0;
  }
  .btn {
    min-width: auto;
    width: 100%;
  }
  .grad-mreza {
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    max-width: 100%;
  }
  .naslov-lokacije {
    width: 150px;
    font-size: 1.5rem;
    padding: 8px 10px;
  }
}
</style>

   <header>
        <h1>Kolmar</h1>
        <p>Prozor u najlepšu bajku Francuske</p>
    </header>
